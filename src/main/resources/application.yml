server:
  port: ${PORT:58080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: ReviewX-Service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB_2}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME_2}
    password: ${MYSQL_PASSWORD_2}
    driver-class-name: com.mysql.cj.jdbc.Driver

    druid:
      initial-size: 2
      min-idle: 2
      max-active: 8
      max-wait: 60000

      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

      filters: stat,wall,slf4j

      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false

      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

reviewx:
  jwt:
    secret: ${REVIEWX_JWT_SECRET:ReviewXJwtSecretKeyForLocalDevelopmentOnly123456}
    expire-seconds: ${REVIEWX_JWT_EXPIRE_SECONDS:7200}
